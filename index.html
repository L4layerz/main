<!DOCTYPE html>
<html class="theme-dark" lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>L4layerz</title>
    <link rel="stylesheet" href="css/reset.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/brands.css">
    
    <style>
        /* 리퀴드 글래스 배경 */
        body {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .container {
            backdrop-filter: blur(15px);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 30px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* 스포티파이 스타일 위젯 */
        .spotify-widget {
            margin-top: 30px;
            background: #181818;
            border-radius: 12px;
            padding: 12px;
            display: flex;
            align-items: center;
            gap: 15px;
            position: relative;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .spotify-widget:hover { transform: translateY(-3px); }
        
        .album-art {
            width: 50px;
            height: 50px;
            border-radius: 4px;
            background: #333; /* 이미지 없을 때 대비 */
        }

        .song-info { flex: 1; overflow: hidden; }
        .song-title { color: #fff; font-size: 14px; font-weight: bold; margin-bottom: 2px; }
        .artist-name { color: #b3b3b3; font-size: 12px; }

        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: rgba(255,255,255,0.1);
            border-radius: 0 0 12px 12px;
        }
        .progress-bar {
            width: 65%; /* 재생 진행도 */
            height: 100%;
            background: #1DB954; /* 스포티파이 그린 */
            border-radius: 0 0 0 12px;
        }

        .spotify-icon {
            width: 20px;
            filter: invert(1);
            opacity: 0.7;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="column">
            <img class="avatar avatar--rounded" src="images/avatar.png" alt="L4layerz">
            <h1><div>L4layerz</div></h1>
            <p>Korean</p>

            <div class="button-stack">
                <a class="button button-discord" href="https://discord.gg/RfhzMmKphJ" target="_blank" rel="noopener">
                    <img class="icon" src="images/icons/discord.svg" alt="Discord">Discord Server
                </a>
                </div>

            <div class="spotify-widget" onclick="togglePlay()">
                <img class="album-art" src="https://i.scdn.co/image/ab67616d0000b27376037e296e8d15024b89eb06" alt="Art">
                <div class="song-info">
                    <div class="song-title">Song Title Name</div>
                    <div class="artist-name">Artist Name</div>
                </div>
                <img class="spotify-icon" src="images/icons/spotify-alt.svg" alt="Spotify">
                <div class="progress-container">
                    <div class="progress-bar" id="pBar"></div>
                </div>
            </div>

            <audio id="myAudio" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

            <footer>
                <p>© 2026 L4layerz</p>
            </footer>
        </div>
    </div>

    <script>
        const audio = document.getElementById("myAudio");
        const pBar = document.getElementById("pBar");

        function togglePlay() {
            if (audio.paused) {
                audio.play();
            } else {
                audio.pause();
            }
        }

        // 재생바 움직이는 효과 (보이는 것만)
        audio.ontimeupdate = function() {
            let percentage = (audio.currentTime / audio.duration) * 100;
            pBar.style.width = percentage + "%";
        };
    </script>
</body>
</html>
