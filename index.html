<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>L4layerz.space</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono&display=swap');

        body {
            background: #000; color: white; margin: 0;
            font-family: 'Inter', sans-serif;
            display: flex; align-items: center; justify-content: center; min-height: 100vh;
            overflow-x: hidden;
        }

        /* 배경 효과: 은은한 노이즈 & 스캔라인 */
        body::before {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%), 
                        url('https://raw.githubusercontent.com/NathanGordon99/noise-texture/master/noise.png');
            background-size: 100% 2px, 200px 200px; opacity: 0.05; pointer-events: none; z-index: 1001;
        }

        .container {
            width: 90%; max-width: 380px; text-align: center;
            padding: 40px 20px; z-index: 1002;
        }

        /* 프로필 & 디스코드 상태 점 */
        .avatar-wrapper {
            position: relative; display: inline-block; margin-bottom: 20px;
        }
        .avatar {
            width: 100px; height: 100px; border-radius: 50%;
            border: 1px solid #222; transition: 0.3s;
            object-fit: cover;
        }
        #status-dot {
            position: absolute; bottom: 8px; right: 8px;
            width: 18px; height: 18px; border-radius: 50%;
            background: #747f8d; border: 3px solid #000;
            transition: background 0.3s ease;
        }

        .status-bar {
            font-family: 'JetBrains Mono', monospace; font-size: 10px; color: #444;
            letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase;
        }

        /* 텍스트 스타일 */
        h1 { font-size: 32px; margin: 0; letter-spacing: -1.5px; font-weight: 700; }
        #discord-activity { font-size: 11px; color: #666; margin-top: 8px; font-family: 'JetBrains Mono'; min-height: 1.2em; }

        /* 스포티파이 위젯 (요청하신 곡 정보 적용) */
        .spotify-widget {
            background: rgba(255,255,255,0.03); border-radius: 15px; padding: 15px;
            display: flex; align-items: center; gap: 15px; border: 1px solid #222;
            cursor: pointer; text-align: left; margin-top: 25px; transition: 0.3s;
        }
        .spotify-widget:hover { border-color: #1DB954; background: rgba(255,255,255,0.06); }
        .album-art { width: 50px; height: 50px; border-radius: 8px; object-fit: cover; }
        
        .song-title { margin: 0; font-size: 13px; font-weight: 700; color: #fff; line-height: 1.4; }
        .artist-name { margin: 0; font-size: 11px; color: #666; margin-top: 2px; }

        /* 버튼 스택 */
        .button-stack { display: flex; flex-direction: column; gap: 10px; margin-top: 15px; }
        .button {
            background: rgba(255,255,255,0.03); border: 1px solid #222; color: white;
            padding: 16px; border-radius: 12px; text-decoration: none; font-size: 14px;
            font-weight: 600; transition: 0.3s;
        }
        .button:hover { background: #fff; color: #000; transform: translateY(-2px); }

        /* 진입 오버레이 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; align-items: center; justify-content: center;
            z-index: 9999; cursor: pointer; transition: 0.8s ease;
        }
        #overlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .glitch-text { letter-spacing: 5px; font-size: 14px; color: #fff; text-shadow: 2px 0 #ff003c, -2px 0 #00e5ff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0.2; } }
    </style>
</head>
<body>

    <div id="overlay" onclick="enterSite()">
        <div class="glitch-text">L 4 L A Y E R Z</div>
    </div>

    <div class="container" id="main-content" style="opacity: 0; transition: 1s;">
        <div class="status-bar">SYSTEM: ONLINE // ENCRYPTED</div>
        
        <div class="avatar-wrapper">
            <img class="avatar" src="https://www.dropbox.com/scl/fi/l8txn2sp3493skedebowt/2044.png?rlkey=3cl2vb0149b2l4228egt6r658&st=xfkpw952&raw=1" alt="Profile">
            <div id="status-dot"></div>
        </div>
        
        <h1>L4layerz</h1>
        <div id="discord-activity">Connecting to Lanyard...</div>

        <div class="spotify-widget" onclick="toggleMusic()">
            <img class="album-art" src="https://www.dropbox.com/scl/fi/78lxjov0du1bacqw7gtxb/20759949.jpg?rlkey=4x9wgjwxp85btoomrbran6mb4&st=7t8fg096&raw=1" alt="Art">
            <div style="flex:1;">
                <p class="song-title">. . . 정 신 병 자 러 브 . . .</p>
                <p class="artist-name">어둠속성모노사파</p>
            </div>
            <div id="music-status" style="color:#1DB954; font-size: 14px;">▶</div>
        </div>

        <div class="button-stack">
            <a href="https://discord.gg/RfhzMmKphJ" target="_blank" class="button">Discord</a>
            <a href="https://github.com/L4layerz" target="_blank" class="button">GitHub</a>
            <a href="https://youtube.com/@l4layerz?si=jLeK_ov36ghyhRzN" target="_blank" class="button">YouTube</a>
        </div>
    </div>

    <audio id="bgm" src="https://www.dropbox.com/scl/fi/cslx9pc2cag12vqfgiiu5/akaBack-320k.mp3?rlkey=vuwmeirbc92vruo21keaagvi2&st=i466hv3p&raw=1" loop></audio>

    <script>
        const DISCORD_ID = "1243921177584472120"; 
        const statusDot = document.getElementById('status-dot');
        const activityText = document.getElementById('discord-activity');

        // Lanyard 실시간 데이터 가져오기
        async function fetchStatus() {
            try {
                const response = await fetch(`https://api.lanyard.rest/v1/users/${DISCORD_ID}`);
                const { data } = await response.json();

                // 점 색상 (온라인, 자리비움, 방해금지, 오프라인)
                const colors = { online: '#43b581', idle: '#faa61a', dnd: '#f04747', offline: '#747f8d' };
                statusDot.style.background = colors[data.discord_status] || '#747f8d';

                // 활동 텍스트 (게임 중이면 게임 이름, 아니면 상태)
                if (data.activities && data.activities.length > 0) {
                    const activity = data.activities.find(a => a.type === 0) || data.activities[0];
                    activityText.innerText = activity.name.toUpperCase();
                } else {
                    activityText.innerText = data.discord_status.toUpperCase();
                }
            } catch (e) {
                activityText.innerText = "STATUS UNKNOWN";
            }
        }

        setInterval(fetchStatus, 15000); // 15초마다 갱신
        fetchStatus();

        function enterSite() {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('main-content').style.opacity = "1";
        }

        const audio = document.getElementById('bgm');
        const mStatus = document.getElementById('music-status');
        function toggleMusic() {
            if (audio.paused) { audio.play(); mStatus.innerText = "⏸"; } 
            else { audio.pause(); mStatus.innerText = "▶"; }
        }
    </script>
</body>
</html>
