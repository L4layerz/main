<!DOCTYPE html>
<html class="theme-dark" lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>L4layerz</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap');

        body {
            background: #000;
            color: white;
            margin: 0;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* 1. 진입 오버레이 (글리치 효과) */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            cursor: pointer;
            transition: opacity 0.5s ease;
        }
        #overlay.hidden { opacity: 0; visibility: hidden; }

        .enter-text {
            font-size: 16px;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-weight: bold;
            color: #fff;
            text-shadow: 2px 0 #ff003c, -2px 0 #00e5ff;
            animation: blink 0.8s infinite;
        }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* 2. 메인 컨테이너 */
        .container {
            width: 90%;
            max-width: 360px;
            text-align: center;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .container.show { opacity: 1; transform: translateY(0); }

        .avatar {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            pointer-events: none;
        }

        h1 { font-size: 26px; margin: 0; letter-spacing: -1px; }
        .bio-text { color: #666; font-size: 14px; margin-top: 5px; margin-bottom: 30px; }

        /* 스포티파이 위젯 디자인 */
        .spotify-widget {
            background: #121212;
            border-radius: 14px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 12px;
            border: 1px solid #222;
            text-align: left;
            transition: 0.3s;
        }
        .spotify-widget:hover { border-color: #1DB954; }
        .album-art { width: 48px; height: 48px; border-radius: 6px; }
        .song-info { flex: 1; }
        .song-title { color: #fff; font-size: 14px; font-weight: 700; margin: 0; }
        .artist-name { color: #b3b3b3; font-size: 11px; margin: 0; }
        .spot-icon { width: 20px; filter: invert(47%) sepia(87%) saturate(445%) hue-rotate(92deg) brightness(96%) contrast(89%); }

        /* 버튼 스타일 */
        .button-stack { display: flex; flex-direction: column; gap: 10px; }
        .button {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .button:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        .icon { width: 18px; filter: invert(1); }
    </style>
</head>

<body>

    <div id="overlay" onclick="enterSite()">
        <div class="enter-text">L 4 L A Y E R Z</div>
    </div>

    <div class="container" id="main-content">
        <img class="avatar" src="images/avatar.png" alt="Profile">
        <h1>L4layerz</h1>
        <p class="bio-text">Korean</p>

        <div class="spotify-widget">
            <img class="album-art" src="https://i.scdn.co/image/ab67616d0000b27376037e296e8d15024b89eb06" alt="Album Art">
            <div class="song-info">
                <p class="song-title">Perfect Night</p>
                <p class="artist-name">LE SSERAFIM</p>
            </div>
            <img src="https://cdn-icons-png.flaticon.com/512/174/174872.png" class="spot-icon" alt="Spotify">
        </div>

        <div class="button-stack">
            <a href="https://discord.gg/RfhzMmKphJ" target="_blank" class="button">
                Discord Server
            </a>
            
            <a href="https://github.com/L4layerz" target="_blank" class="button">
                GitHub
            </a>

            <a href="https://youtube.com/@l4layerz?si=jLeK_ov36ghyhRzN" target="_blank" class="button">
                YouTube
            </a>
        </div>

        <footer style="margin-top: 40px; color: #333; font-size: 10px; letter-spacing: 1px;">
            © 2026 L4LAYERZ. ALL RIGHTS RESERVED.
        </footer>
    </div>

    <script>
        function enterSite() {
            document.getElementById('overlay').classList.add('hidden');
            document.getElementById('main-content').classList.add('show');
            document.body.style.overflow = 'auto';
        }
    </script>

</body>
</html>
